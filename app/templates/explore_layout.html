<div class="explore-outer">
    <div class="explore-layout">
        <div id="path-column" class="explore-path-column">
            {% include "explore_path.html" %}
        </div>
        <div id="next-level" class="explore-next-column">
            {% include "explore_next.html" %}
        </div>
    </div>

    <div class="explore-bottom-bar">
        <div id="selected-pills" class="selected-pills-area">
            {% include "explore_pills.html" %}
        </div>

        <div class="explore-bottom-controls">
            <div id="create-options" class="create-mode-options">
                <span class="create-mode-label">Painotus:</span>
                <label class="mode-radio">
                    <input type="radio" name="mode" value="popular"> Suosituimmat
                </label>
                <label class="mode-radio">
                    <input type="radio" name="mode" value="mix" checked> Sekoitus
                </label>
                <label class="mode-radio">
                    <input type="radio" name="mode" value="discovery"> Uutta
                </label>
                <input type="number" name="count" value="20" min="5" max="50"
                       class="count-input" title="Kappaleiden määrä">
                <span class="count-label">kpl</span>
            </div>
            <button class="btn btn-primary"
                    hx-post="/explore/create"
                    hx-include="#explore-state, #create-options"
                    hx-target="main"
                    hx-swap="innerHTML"
                    hx-indicator="#create-spinner">
                Luo soittolista
            </button>
            <span id="create-spinner" class="htmx-indicator explore-spinner">Luodaan...</span>
        </div>
    </div>
</div>

<div id="explore-state" style="display:none">
    <input type="hidden" name="path_json" value="{{ path_json }}">
    <input type="hidden" name="focus_json" value="{{ focus_json }}">
    <input type="hidden" name="selected_json" value="{{ selected_json }}">
    <input type="hidden" name="neighbors_json" value="{{ neighbors_json }}">
</div>
