{% if devices %}
<div class="device-selector">
    <label for="device-select">Laite:</label>
    <select id="device-select" class="device-select" onchange="document.querySelectorAll('[name=device_id]').forEach(el => el.value = this.value)">
        {% for d in devices %}
        <option value="{{ d.id }}"{% if d.is_active %} selected{% endif %}>
            {{ d.name }} ({{ d.type }}){% if d.is_active %} ✓{% endif %}
        </option>
        {% endfor %}
    </select>
    <button class="btn btn-sm"
            hx-get="/discover/player/devices"
            hx-target="#device-area"
            hx-swap="innerHTML">↻</button>
</div>
{% else %}
<div class="device-selector device-none">
    <span class="muted">Ei aktiivisia laitteita — avaa Spotify jollakin laitteella.</span>
    <button class="btn btn-sm"
            hx-get="/discover/player/devices"
            hx-target="#device-area"
            hx-swap="innerHTML">↻ Päivitä</button>
</div>
{% endif %}
