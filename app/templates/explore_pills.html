{% if selected %}
<span class="selected-label">Valittu:</span>
{% for artist in selected %}
<span class="selected-pill">
    {{ artist }}
    <button class="pill-remove"
            title="Poista valinnasta"
            hx-post="/explore/select-toggle"
            hx-vals='{"artist": {{ artist | tojson }}}'
            hx-include="#explore-state"
            hx-target="#next-level"
            hx-swap="innerHTML">&#215;</button>
</span>
{% endfor %}
<span class="selected-count">{{ selected | length }} artistia</span>
{% else %}
<span class="selected-empty">Ei valittuja artisteja &mdash; lisää naapurilistalta tai puusta</span>
{% endif %}
