{% set rating = ratings.get(track.uri, 0) %}
<div class="track-card{% if rating == 1 %} liked{% elif rating == -1 %} disliked{% endif %}" id="card-{{ track.uri | replace(':', '-') | replace('/', '-') }}">
    {% if track.image_url %}
    <img class="track-img" src="{{ track.image_url }}" alt="{{ track.title }}">
    {% else %}
    <div class="track-img track-img-placeholder">🎵</div>
    {% endif %}
    <div class="track-info">
        <div class="track-title">{{ track.title }}</div>
        <div class="track-artist">{{ track.artist }}</div>
        {% if track.reason %}
        <div class="track-reason">{{ track.reason }}</div>
        {% endif %}
    </div>
    <div class="track-actions">
        <form hx-post="/discover/player/play"
              hx-target="#player-feedback"
              hx-swap="innerHTML">
            <input type="hidden" name="uri" value="{{ track.uri }}">
            <input type="hidden" name="device_id" value="">
            <button type="submit" class="btn btn-primary btn-sm play-btn">▶ Kuuntele</button>
        </form>
        <div class="rating-btns">
            <form hx-post="/discover/rate"
                  hx-target="closest .track-card"
                  hx-swap="outerHTML">
                <input type="hidden" name="uri" value="{{ track.uri }}">
                <input type="hidden" name="rating" value="1">
                <button type="submit" class="rating-btn{% if rating == 1 %} active-like{% endif %}">👍</button>
            </form>
            <form hx-post="/discover/rate"
                  hx-target="closest .track-card"
                  hx-swap="outerHTML">
                <input type="hidden" name="uri" value="{{ track.uri }}">
                <input type="hidden" name="rating" value="-1">
                <button type="submit" class="rating-btn{% if rating == -1 %} active-dislike{% endif %}">👎</button>
            </form>
        </div>
    </div>
</div>
