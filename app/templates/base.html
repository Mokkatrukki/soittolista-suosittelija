<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Soittolista-suosittelija{% endblock %}</title>
    <script src="/static/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">🎵 Soittolista</a>
            <a href="/create" class="nav-link">Luo soittolista</a>
            <a href="/discover" class="nav-link">Discover</a>
            <a href="/explore" class="nav-link">Verkosto</a>
            {% if user_id %}
                <span class="user">{{ display_name }}</span>
                <a href="/auth/logout" class="btn btn-sm">Kirjaudu ulos</a>
            {% else %}
                <a href="/auth/login" class="btn btn-primary">Kirjaudu Spotifylla</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
