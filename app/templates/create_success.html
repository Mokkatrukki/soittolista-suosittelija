<div class="create-success">
    <div class="create-success-icon">✅</div>
    <h3>Soittolista luotu!</h3>
    <p><strong>{{ playlist_name }}</strong> — {{ track_count }} kappaletta</p>
    {% if playlist_url %}
    <a href="{{ playlist_url }}" target="_blank" rel="noopener" class="btn btn-primary">
        Avaa Spotifyssa
    </a>
    {% endif %}
    <p class="create-success-hint">Voit luoda uuden soittolistan kirjoittamalla chatissa.</p>
</div>
